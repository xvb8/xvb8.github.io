<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Timer Queue</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    color-scheme: light;
    --bg: #faf8f4;
    --surface: #ffffff;
    --surface2: #f3efe7;
    --surface3: #ece7de;
    --border: #e6e2d9;
    --border2: #ccc8be;
    --text: #1a1917;
    --text2: #6b6760;
    --text3: #a09c96;
    --accent2: #7a5c1e;
    --active: #2a5f4e;
    --active-light: #5a9d86;
    --active-hover: #1e4539;
    --text-on-active: #faf8f4;
    --danger: #8b2e2e;
    --done-bg: #e8f0ed;
    --done-text: #2a5f4e;
    --done-border: #bcd4cc;
    --mono: 'DM Mono', monospace;
    --sans: 'DM Sans', sans-serif;
  }

  @media (prefers-color-scheme: dark) {
    :root {
      color-scheme: dark;
      --bg: #18171a;
      --surface: #222128;
      --surface2: #2a2830;
      --surface3: #333039;
      --border: #333039;
      --border2: #44414d;
      --text: #f0eee9;
      --text2: #968f9d;
      --text3: #5e5868;
      --accent2: #e0b96a;
      --active: #5fbfa3;
      --active-light: #7acfb3;
      --active-hover: #4fa88f;
      --text-on-active: #18171a;
      --danger: #e88e8e;
      --done-bg: #1a2e29;
      --done-text: #7acfb3;
      --done-border: #35574c;
    }
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 2rem 1rem 4rem;
  }

  header {
    width: 100%;
    max-width: 700px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 2.5rem;
    padding-bottom: 1rem;
    border-bottom: 1px solid var(--border);
  }

  h1 {
    font-family: var(--mono);
    font-size: 13px;
    font-weight: 400;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--text2);
  }

  .header-meta {
    display: flex;
    align-items: center;
    gap: 10px;
    flex-wrap: wrap;
    justify-content: flex-end;
  }

  .badge { font-family: var(--mono); font-size: 11px; color: var(--text3); letter-spacing: 0.08em; }

  .main { width: 100%; max-width: 700px; display: flex; flex-direction: column; gap: 10px; }

  .active-card {
    background: var(--surface);
    border: 1px solid var(--border2);
    border-radius: 12px;
    padding: 2rem 2rem 1.5rem;
    position: relative;
    overflow: hidden;
    margin-bottom: 4px;
  }

  #progress-stripe {
    position: absolute;
    top: 0; left: 0;
    height: 2px;
    background: var(--active-light);
    width: 0%;
  }

  .active-label {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--active-light);
    margin-bottom: 0.5rem;
  }

  .active-title { font-size: 22px; font-weight: 400; color: var(--text); margin-bottom: 1.25rem; letter-spacing: -0.01em; }

  #timer-display {
    font-family: var(--mono);
    font-size: 56px;
    font-weight: 300;
    letter-spacing: -0.03em;
    color: var(--text);
    line-height: 1;
    margin-bottom: 1.5rem;
    font-variant-numeric: tabular-nums;
  }

  .progress-bar { width: 100%; height: 3px; background: var(--surface3); border-radius: 2px; overflow: hidden; margin-bottom: 1.5rem; }
  #progress-fill { height: 100%; background: var(--active-light); border-radius: 2px; }

  .controls { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }

  .btn {
    background: var(--surface2);
    border: 1px solid var(--border2);
    border-radius: 8px;
    color: var(--text2);
    font-family: var(--sans);
    font-size: 13px;
    cursor: pointer;
    padding: 8px 16px;
    transition: background 0.15s, color 0.15s;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .btn:hover { background: var(--surface3); color: var(--text); }
  .btn:active { opacity: 0.8; }

  .btn-primary { background: var(--active); border-color: transparent; color: var(--text-on-active); font-weight: 500; padding: 8px 20px; }
  .btn-primary:hover { background: var(--active-hover); color: var(--text-on-active); border-color: transparent; }

  .btn-ghost { background: transparent; border-color: transparent; color: var(--text3); font-size: 12px; }
  .btn-ghost:hover { background: var(--surface2); color: var(--text2); border-color: transparent; }

  .sound-btn {
    margin-left: auto;
    color: var(--active);
  }

  .sound-btn svg {
    width: 16px;
    height: 16px;
    display: block;
  }

  .sound-btn:hover {
    color: var(--active-light);
  }

  .sound-btn.muted {
    color: var(--text3);
  }

  .sound-btn.muted:hover {
    color: var(--text2);
  }

  .queue-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0 2px;
    margin-bottom: 2px;
    margin-top: 6px;
  }

  .queue-label { font-family: var(--mono); font-size: 10px; letter-spacing: 0.15em; text-transform: uppercase; color: var(--text3); }

  .queue-scroll {
    display: flex;
    flex-direction: column;
    gap: 5px;
    max-height: 360px;
    overflow-y: auto;
    padding-right: 3px;
  }

  .queue-scroll::-webkit-scrollbar { width: 4px; }
  .queue-scroll::-webkit-scrollbar-track { background: transparent; }
  .queue-scroll::-webkit-scrollbar-thumb { background: var(--surface3); border-radius: 2px; }

  .timer-row {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 14px;
    display: grid;
    grid-template-columns: 32px 1fr auto auto;
    gap: 10px;
    align-items: center;
  }

  .timer-row:hover { border-color: var(--border2); }

  .timer-row.done {
    background: var(--done-bg);
    border-color: transparent;
    opacity: 0.45;
  }

  .row-index { font-family: var(--mono); font-size: 11px; color: var(--text3); text-align: center; }
  .timer-row.done .row-index { color: var(--done-text); }

  .row-title { font-size: 13px; color: var(--text); }
  .timer-row.done .row-title { text-decoration: line-through; color: var(--text3); }

  .row-time { font-family: var(--mono); font-size: 12px; color: var(--text2); }
  .timer-row.done .row-time { color: var(--done-text); }

  .row-actions { display: flex; gap: 3px; opacity: 0; transition: opacity 0.12s; }
  .timer-row:hover .row-actions { opacity: 1; }

  .row-btn {
    background: none; border: none; color: var(--text3);
    cursor: pointer; padding: 3px 5px; border-radius: 4px;
    font-size: 12px; transition: all 0.1s;
  }
  .row-btn:hover { color: var(--text); background: var(--surface3); }
  .row-btn.del:hover { color: var(--danger); }

  .timer-row[draggable="true"] { cursor: grab; }
  .timer-row.dragging { opacity: 0.35; }
  .timer-row.drag-over { border-color: var(--active-light); box-shadow: 0 -2px 0 0 var(--active-light); }

  .add-area {
    background: var(--surface);
    border: 1px dashed var(--border2);
    border-radius: 10px;
    padding: 12px 14px;
    margin-top: 4px;
  }

  .add-form { display: grid; grid-template-columns: 1fr 70px 58px 62px; gap: 8px; align-items: center; }

  .add-input {
    background: var(--surface3);
    border: 1px solid var(--border2);
    border-radius: 6px;
    color: var(--text);
    font-family: var(--sans);
    font-size: 13px;
    padding: 7px 10px;
    outline: none;
    width: 100%;
  }

  .add-input:focus { border-color: var(--active-light); }
  .add-input::placeholder { color: var(--text3); }

  .add-btn {
    background: var(--surface2); border: 1px solid var(--border2); border-radius: 6px;
    color: var(--text2); font-size: 13px; padding: 7px 10px; cursor: pointer;
    font-family: var(--sans); width: 100%; transition: all 0.15s;
  }
  .add-btn:hover { background: var(--active); color: var(--text-on-active); border-color: transparent; }

  .complete-banner {
    background: var(--done-bg); border: 1px solid var(--done-border); border-radius: 10px;
    padding: 2rem; text-align: center;
  }
  .complete-banner h2 { font-size: 18px; font-weight: 400; color: var(--done-text); margin-bottom: 6px; }
  .complete-banner p { font-size: 13px; color: var(--text3); margin-bottom: 1.25rem; }

  .edit-input {
    background: var(--surface3); border: 1px solid var(--active-light); border-radius: 4px;
    color: var(--text); font-family: inherit; font-size: 13px; padding: 3px 6px; outline: none; width: 100%;
  }

  @keyframes urgentBlink { 0%,100% { opacity: 1; } 50% { opacity: 0.25; } }
  .urgent-anim { animation: urgentBlink 1s ease-in-out infinite; color: var(--danger) !important; }

  .overtime { color: var(--danger) !important; }

  .sync-section {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 8px 16px;
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 4px;
    font-size: 13px;
  }
  .sync-section.connected { border-color: var(--active); }
  .sync-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--text3); flex-shrink: 0;
  }
  .sync-dot.waiting { background: var(--accent2); }
  .sync-dot.connected { background: var(--active); }
  .sync-label { font-family: var(--mono); font-size: 10px; letter-spacing: 0.15em; text-transform: uppercase; color: var(--text3); }
  .sync-section.connected .sync-label { color: var(--active); }
  .sync-actions { margin-left: auto; display: flex; gap: 6px; align-items: center; }

  .timer-ms { font-size: 0.45em; opacity: 0.55; vertical-align: baseline; }

  .buffer-section {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 16px;
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 4px;
  }
  .buffer-section.active { border-color: var(--accent2); }
  .buffer-label { font-family: var(--mono); font-size: 10px; letter-spacing: 0.15em; text-transform: uppercase; color: var(--text3); }
  .buffer-section.active .buffer-label { color: var(--accent2); }
  .buffer-time { font-family: var(--mono); font-size: 22px; font-weight: 300; color: var(--text2); font-variant-numeric: tabular-nums; letter-spacing: -0.02em; }
  .buffer-section.active .buffer-time { color: var(--accent2); }
  .buffer-actions { margin-left: auto; display: flex; gap: 6px; align-items: center; }
</style>
</head>
<body>
<header>
  <h1>Timer Queue</h1>
  <div class="header-meta">
    <button class="btn btn-ghost" id="authBtn">Sign In</button>
    <span class="badge" id="total-badge"></span>
  </div>
</header>

<div class="main" id="app"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="cloud-config.js"></script>
<script>
const TIMER_TABLE = 'timer_items';
const TIMER_STATE_TABLE = 'timer_state';

const cloudState = {
  client: null,
  user: null,
  authReady: false,
  authBound: false,
  statusMessage: ''
};

const state = {
  timers: [],
  current: 0,
  elapsedMs: 0,
  running: false,
  done: false,
  editingId: null,
  editingActive: false,
  sound: true,
  bufferTotalMs: 89000,
  bufferRemainingMs: 89000,
  bufferActive: false,
  editingBuffer: false,
  slideSyncEnabled: false,
  slideSyncConnected: false
};

let rafId = null;
let lastTick = null;
let syncChannel = null;

function getCloudConfig() {
  const config = window.XVB8_CLOUD_CONFIG || {};
  if (!config.supabaseUrl || !config.supabaseAnonKey) return null;
  return config;
}

function initSupabase() {
  if (cloudState.client) return cloudState.client;
  const config = getCloudConfig();
  if (!config || !window.supabase) return null;
  cloudState.client = window.supabase.createClient(config.supabaseUrl, config.supabaseAnonKey);
  return cloudState.client;
}

function updateAuthButton() {
  const button = document.getElementById('authBtn');
  if (!button) return;
  if (!getCloudConfig()) {
    button.textContent = 'Cloud Setup';
    return;
  }
  button.textContent = cloudState.user ? 'Sign Out' : 'Sign In';
}

async function refreshSession() {
  const client = initSupabase();
  if (!client) {
    cloudState.user = null;
    cloudState.authReady = true;
    updateAuthButton();
    render();
    return;
  }

  const { data, error } = await client.auth.getSession();
  cloudState.user = error ? null : (data.session?.user || null);
  cloudState.authReady = true;
  cloudState.statusMessage = error ? `Cloud auth failed: ${error.message}` : '';
  updateAuthButton();
}

function bindAuthListener() {
  if (cloudState.authBound) return;
  const client = initSupabase();
  if (!client) return;

  client.auth.onAuthStateChange((_event, session) => {
    cloudState.user = session?.user || null;
    cloudState.authReady = true;
    cloudState.statusMessage = '';
    cancelAnimationFrame(rafId);
    state.running = false;
    state.editingId = null;
    state.editingActive = false;
    if (!cloudState.user) {
      state.timers = [];
      state.current = 0;
      state.elapsedMs = 0;
      state.done = false;
    }
    updateAuthButton();
    void loadCloudState();
  });

  cloudState.authBound = true;
}

async function promptSignIn() {
  const client = initSupabase();
  if (!client) {
    alert('Cloud backend not configured. Edit cloud-config.js with your Supabase URL and anon key.');
    return false;
  }

  const email = window.prompt('Enter your account email.');
  if (email === null) return false;
  if (!email.trim()) {
    alert('Email is required.');
    return false;
  }

  const password = window.prompt('Enter your account password.');
  if (password === null) return false;

  const { error } = await client.auth.signInWithPassword({
    email: email.trim(),
    password
  });

  if (error) {
    alert(error.message);
    return false;
  }

  await refreshSession();
  return Boolean(cloudState.user);
}

async function handleAuthButton() {
  const client = initSupabase();
  if (!client) {
    alert('Cloud backend not configured. Edit cloud-config.js with your Supabase URL and anon key.');
    return;
  }

  if (cloudState.user) {
    const { error } = await client.auth.signOut();
    if (error) {
      alert(error.message);
      return;
    }
    cloudState.user = null;
    cloudState.statusMessage = 'Signed out.';
    state.timers = [];
    state.current = 0;
    state.elapsedMs = 0;
    state.running = false;
    state.done = false;
    updateAuthButton();
    render();
    return;
  }

  await promptSignIn();
}

async function ensureAuthenticated(actionLabel) {
  if (cloudState.user) return true;
  const signedIn = await promptSignIn();
  if (!signedIn) return false;
  if (!cloudState.user) {
    alert(`Sign in is required to ${actionLabel}.`);
    return false;
  }
  return true;
}

function pad(n) { return String(n).padStart(2, '0'); }

function fmt(s) {
  s = Math.max(0, s);
  const h = Math.floor(s / 3600);
  const m = Math.floor((s % 3600) / 60);
  const sec = s % 60;
  return h > 0 ? `${pad(h)}:${pad(m)}:${pad(sec)}` : `${pad(m)}:${pad(sec)}`;
}

function fmtMs(ms) {
  ms = Math.max(0, ms);
  const totalSec = Math.floor(ms / 1000);
  const millis = Math.floor(ms % 1000);
  const h = Math.floor(totalSec / 3600);
  const m = Math.floor((totalSec % 3600) / 60);
  const s = totalSec % 60;
  const ms3 = String(millis).padStart(3, '0');
  return h > 0 ? `${pad(h)}:${pad(m)}:${pad(s)}.${ms3}` : `${pad(m)}:${pad(s)}.${ms3}`;
}

function fmtMsHtml(ms) {
  ms = Math.max(0, ms);
  const totalSec = Math.floor(ms / 1000);
  const millis = Math.floor(ms % 1000);
  const h = Math.floor(totalSec / 3600);
  const m = Math.floor((totalSec % 3600) / 60);
  const s = totalSec % 60;
  const ms3 = String(millis).padStart(3, '0');
  const main = h > 0 ? `${pad(h)}:${pad(m)}:${pad(s)}` : `${pad(m)}:${pad(s)}`;
  return `${main}<span class="timer-ms">.${ms3}</span>`;
}

function fmtShort(s) {
  const h = Math.floor(s / 3600);
  const m = Math.floor((s % 3600) / 60);
  const sec = s % 60;
  if (h > 0) return `${h}h ${m}m`;
  if (m > 0) return `${m}m${sec > 0 ? ` ${sec}s` : ''}`;
  return `${sec}s`;
}

function esc(s) {
  return String(s)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

function syncCurrentBounds() {
  if (!state.timers.length) {
    state.current = 0;
    state.elapsedMs = 0;
    state.done = false;
    return;
  }
  state.current = Math.min(Math.max(state.current, 0), state.timers.length - 1);
  const currentTimer = state.timers[state.current];
  if (!state.slideSyncEnabled) {
    state.elapsedMs = Math.min(Math.max(state.elapsedMs, 0), Math.max(currentTimer.seconds * 1000 - 1, 0));
  } else {
    state.elapsedMs = Math.max(state.elapsedMs, 0);
  }
  if (state.done) {
    state.current = state.timers.length - 1;
    state.elapsedMs = 0;
  }
}

async function saveTimerState(alertOnError = false) {
  const client = initSupabase();
  if (!client || !cloudState.user) return true;

  syncCurrentBounds();

  const payload = {
    owner_id: cloudState.user.id,
    current_index: state.timers.length ? state.current : 0,
    elapsed: Math.round(state.elapsedMs),
    sound: state.sound,
    done: state.done,
    buffer_total_ms: Math.round(state.bufferTotalMs),
    buffer_remaining_ms: Math.round(state.bufferRemainingMs)
  };

  const { error } = await client.from(TIMER_STATE_TABLE).upsert(payload, { onConflict: 'owner_id' });
  if (error) {
    if (alertOnError) alert(error.message);
    return false;
  }
  return true;
}

async function saveTimerPositions(alertOnError = false) {
  const client = initSupabase();
  if (!client || !cloudState.user || !state.timers.length) return true;
  const payload = state.timers.map((timer, index) => ({
    id: timer.id,
    owner_id: cloudState.user.id,
    title: timer.title,
    seconds: timer.seconds,
    position: index
  }));
  const { error } = await client.from(TIMER_TABLE).upsert(payload, { onConflict: 'id' });
  if (error) {
    if (alertOnError) alert(error.message);
    return false;
  }
  return true;
}

async function loadCloudState() {
  const client = initSupabase();
  if (!getCloudConfig()) {
    cloudState.statusMessage = 'Cloud backend not configured. Fill in cloud-config.js and README setup.';
    state.timers = [];
    render();
    return;
  }

  if (!cloudState.authReady) {
    render();
    return;
  }

  if (!cloudState.user) {
    state.timers = [];
    state.current = 0;
    state.elapsedMs = 0;
    state.running = false;
    state.done = false;
    render();
    return;
  }

  let timersResult = await client
    .from(TIMER_TABLE)
    .select('id, title, seconds, position')
    .eq('owner_id', cloudState.user.id)
    .order('position', { ascending: true });

  const stateResult = await client
    .from(TIMER_STATE_TABLE)
    .select('current_index, elapsed, sound, done, buffer_total_ms, buffer_remaining_ms')
    .eq('owner_id', cloudState.user.id)
    .maybeSingle();

  if (timersResult.error) {
    state.timers = [];
    cloudState.statusMessage = `Cloud load failed: ${timersResult.error.message || timersResult.error}`;
    render();
    return;
  }

  if (stateResult.error) {
    cloudState.statusMessage = `Cloud state load failed: ${stateResult.error.message}`;
  } else {
    cloudState.statusMessage = '';
  }

  state.timers = (timersResult.data || []).map(timer => ({
    id: timer.id,
    title: timer.title,
    seconds: timer.seconds
  }));

  const saved = stateResult.data || { current_index: 0, elapsed: 0, sound: true, done: false, buffer_total_ms: 89000, buffer_remaining_ms: 89000 };
  state.current = Number.isInteger(saved.current_index) ? saved.current_index : 0;
  state.elapsedMs = Number.isInteger(saved.elapsed) ? saved.elapsed : 0;
  state.sound = saved.sound !== false;
  state.done = Boolean(saved.done);
  state.bufferTotalMs = Number.isInteger(saved.buffer_total_ms) ? saved.buffer_total_ms : 89000;
  state.bufferRemainingMs = Number.isInteger(saved.buffer_remaining_ms) ? saved.buffer_remaining_ms : 89000;
  state.bufferActive = false;
  state.running = false;
  state.editingId = null;
  state.editingActive = false;
  syncCurrentBounds();
  render();
}

function beep() {
  if (!state.sound) return;
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.frequency.value = 880;
    gain.gain.setValueAtTime(0.3, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.4);
    osc.start();
    osc.stop(ctx.currentTime + 0.4);
  } catch (error) {
  }
}

function runLoop(ts) {
  if (!state.running) return;
  if (lastTick === null) { lastTick = ts; }
  const delta = ts - lastTick;
  lastTick = ts;

  if (state.bufferActive) {
    state.bufferRemainingMs = Math.max(0, state.bufferRemainingMs - delta);
    if (state.bufferRemainingMs <= 0) {
      state.bufferActive = false;
      beep();
      render();
    }
    updateActiveDisplay();
    rafId = requestAnimationFrame(runLoop);
    return;
  }

  const cur = state.timers[state.current];
  if (!cur) {
    state.running = false;
    render();
    return;
  }
  state.elapsedMs += delta;
  const totalMs = cur.seconds * 1000;
  if (state.elapsedMs >= totalMs) {
    if (state.slideSyncEnabled) {
      // Slide sync active: don't auto-advance, let timer run into overtime
      // Beep once when first crossing the boundary
      if (state.elapsedMs - delta < totalMs) beep();
      updateActiveDisplay();
      rafId = requestAnimationFrame(runLoop);
      return;
    }
    beep();
    state.elapsedMs = 0;
    if (state.current >= state.timers.length - 1) {
      state.running = false;
      state.done = true;
      state.current = Math.max(0, state.timers.length - 1);
      render();
      void saveTimerState();
      return;
    }
    state.current++;
    render();
    void saveTimerState();
    rafId = requestAnimationFrame(runLoop);
    return;
  }
  updateActiveDisplay();
  rafId = requestAnimationFrame(runLoop);
}

function updateBadge() {
  const badge = document.getElementById('total-badge');
  if (!badge) return;
  if (!cloudState.user || !state.timers.length) {
    badge.textContent = '';
    return;
  }
  const curRemSec = state.timers[state.current] ? Math.max(Math.ceil((state.timers[state.current].seconds * 1000 - state.elapsedMs) / 1000), 0) : 0;
  const rem = state.timers.slice(state.current).reduce((sum, timer, index) =>
    sum + (index === 0 ? curRemSec : timer.seconds), 0);
  badge.textContent = `${state.timers.length} slide${state.timers.length !== 1 ? 's' : ''} · ${fmtShort(rem)} left`;
}

function updateActiveDisplay() {
  const cur = state.timers[state.current];
  if (!cur) return;
  const totalMs = cur.seconds * 1000;
  const remainingMs = totalMs - state.elapsedMs;
  const isOvertime = remainingMs < 0;
  const pct = Math.min((state.elapsedMs / totalMs) * 100, 100);
  const disp = document.getElementById('timer-display');
  if (disp) {
    if (isOvertime) {
      disp.innerHTML = '-' + fmtMsHtml(-remainingMs);
      disp.classList.remove('urgent-anim');
      disp.classList.add('overtime');
    } else {
      disp.innerHTML = fmtMsHtml(remainingMs);
      disp.classList.remove('overtime');
      if (remainingMs <= 10000 && remainingMs > 0) disp.classList.add('urgent-anim');
      else disp.classList.remove('urgent-anim');
    }
  }
  const fill = document.getElementById('progress-fill');
  if (fill) fill.style.width = `${pct}%`;
  const stripe = document.getElementById('progress-stripe');
  if (stripe) stripe.style.width = `${pct}%`;
  const bufDisp = document.getElementById('buffer-display');
  if (bufDisp) bufDisp.textContent = fmtMs(state.bufferRemainingMs);
  updateBadge();
}

function startTimer() {
  if (state.done || !state.timers.length) return;
  state.running = true;
  lastTick = null;
  const pb = document.getElementById('play-btn');
  if (pb) pb.outerHTML = '<button class="btn btn-primary" id="play-btn" onclick="pauseTimer()">⏸ Pause</button>';
  rafId = requestAnimationFrame(runLoop);
}

function pauseTimer() {
  state.running = false;
  cancelAnimationFrame(rafId);
  const pb = document.getElementById('play-btn');
  if (pb) pb.outerHTML = '<button class="btn btn-primary" id="play-btn" onclick="startTimer()">▶ Resume</button>';
  void saveTimerState();
}

function skipTimer() {
  beep();
  if (!state.timers.length) return;
  state.bufferActive = false;
  if (state.current >= state.timers.length - 1) {
    state.running = false;
    state.done = true;
    state.current = Math.max(0, state.timers.length - 1);
    state.elapsedMs = 0;
  } else {
    state.current++;
    state.elapsedMs = 0;
  }
  lastTick = null;
  render();
  void saveTimerState();
  if (state.running) rafId = requestAnimationFrame(runLoop);
}

function resetAll() {
  cancelAnimationFrame(rafId);
  state.current = 0;
  state.elapsedMs = 0;
  state.running = false;
  state.done = false;
  state.editingActive = false;
  state.editingId = null;
  state.bufferActive = false;
  state.bufferRemainingMs = state.bufferTotalMs;
  state.editingBuffer = false;
  lastTick = null;
  render();
  void saveTimerState();
}

function rewindTimer() {
  if (!state.timers.length) return;
  state.bufferActive = false;
  if (state.current > 0) {
    state.current--;
    state.elapsedMs = 0;
  } else {
    state.elapsedMs = 0;
  }
  state.done = false;
  lastTick = null;
  render();
  void saveTimerState();
  if (state.running) rafId = requestAnimationFrame(runLoop);
}

function toggleBuffer() {
  if (state.done || !state.timers.length) return;
  if (state.bufferActive) {
    state.bufferActive = false;
  } else {
    if (state.bufferRemainingMs <= 0) return;
    state.bufferActive = true;
  }
  lastTick = null;
  render();
  if (state.running) rafId = requestAnimationFrame(runLoop);
}

function skipAddToBuffer() {
  if (state.done || !state.timers.length) return;
  const cur = state.timers[state.current];
  if (!cur) return;
  const remainingMs = cur.seconds * 1000 - state.elapsedMs;
  if (remainingMs > 0) {
    state.bufferRemainingMs += remainingMs;
  }
  state.bufferActive = false;
  if (state.current >= state.timers.length - 1) {
    state.running = false;
    state.done = true;
    state.current = Math.max(0, state.timers.length - 1);
    state.elapsedMs = 0;
  } else {
    state.current++;
    state.elapsedMs = 0;
  }
  lastTick = null;
  render();
  void saveTimerState();
  if (state.running) rafId = requestAnimationFrame(runLoop);
}

function startEditBuffer() {
  if (state.running) pauseTimer();
  state.bufferActive = false;
  state.editingBuffer = true;
  render();
}

function saveEditBuffer() {
  const mins = parseInt(document.getElementById('buf-min')?.value, 10) || 0;
  const secs = parseInt(document.getElementById('buf-sec')?.value, 10) || 0;
  const newTotal = (mins * 60 + secs) * 1000;
  if (newTotal > 0) {
    const diff = newTotal - state.bufferTotalMs;
    state.bufferTotalMs = newTotal;
    state.bufferRemainingMs = Math.max(0, state.bufferRemainingMs + diff);
  }
  state.editingBuffer = false;
  render();
}

function cancelEditBuffer() {
  state.editingBuffer = false;
  render();
}

/* ── Google Slides Sync ── */

const SYNC_RELAY_URL = new URL('sync-relay.html', location.href).href;

const SLIDES_SNIPPET = `(function(){var R=window.open('${SYNC_RELAY_URL.replace(/'/g, "\\'")}','timer-sync-relay','width=320,height=60');var idx=0,ready=false,q=[];function send(msg){if(ready)R.postMessage(msg,'${new URL(SYNC_RELAY_URL).origin}');else q.push(msg)}window.addEventListener('message',function(e){if(e.data&&e.data.type==='relayReady'){ready=true;q.forEach(function(m){R.postMessage(m,'${new URL(SYNC_RELAY_URL).origin}')});q=[];console.log('[TimerSync] Relay connected')}});send({type:'hello'});send({type:'slideChange',slideIndex:0});document.addEventListener('keydown',function(e){var k=e.key,prev=idx;if(k==='ArrowRight'||k==='ArrowDown'||k==='PageDown'||k===' ')idx++;else if(k==='ArrowLeft'||k==='ArrowUp'||k==='PageUp')idx=Math.max(0,idx-1);else if(k==='Home')idx=0;else if(k==='End')idx=9999;else return;if(idx!==prev){send({type:'slideChange',slideIndex:idx});console.log('[TimerSync] Slide',idx+1)}},true);console.log('[TimerSync] Keyboard tracking active — slide 1. Use arrow keys to navigate.')})();`;

function initSlideSync() {
  if (syncChannel) syncChannel.close();
  state.slideSyncEnabled = true;
  state.slideSyncConnected = false;
  syncChannel = new BroadcastChannel('timer-queue-sync');
  syncChannel.onmessage = function(e) {
    const data = e.data;
    if (!data || typeof data !== 'object') return;
    if (data.type === 'hello') {
      state.slideSyncConnected = true;
      render();
      return;
    }
    if (data.type === 'slideChange' && typeof data.slideIndex === 'number') {
      state.slideSyncConnected = true;
      handleSlideChange(data.slideIndex);
    }
  };
  render();
}

function stopSlideSync() {
  state.slideSyncEnabled = false;
  state.slideSyncConnected = false;
  if (syncChannel) { syncChannel.close(); syncChannel = null; }
  render();
}

function toggleSlideSync() {
  if (state.slideSyncEnabled) stopSlideSync();
  else initSlideSync();
}

function copySyncSnippet() {
  navigator.clipboard.writeText(SLIDES_SNIPPET).then(function() {
    const btn = document.getElementById('copy-snippet-btn');
    if (btn) { btn.textContent = '✓ Copied'; setTimeout(function() { btn.textContent = '📋 Copy snippet'; }, 1500); }
  });
}

function handleSlideChange(targetIndex) {
  if (state.done && targetIndex < state.timers.length) {
    state.done = false;
  }
  if (!state.timers.length) return;
  targetIndex = Math.max(0, Math.min(targetIndex, state.timers.length - 1));
  if (targetIndex === state.current) return;

  if (targetIndex > state.current) {
    // Forward: bank or draw buffer for each skipped timer
    for (let i = state.current; i < targetIndex; i++) {
      const timer = state.timers[i];
      if (!timer) continue;
      const elapsed = (i === state.current) ? state.elapsedMs : 0;
      const remainingMs = timer.seconds * 1000 - elapsed;
      if (remainingMs > 0) {
        // Finished early — bank remaining time
        state.bufferRemainingMs += remainingMs;
      } else if (remainingMs < 0) {
        // Went overtime — draw from buffer
        state.bufferRemainingMs = Math.max(0, state.bufferRemainingMs + remainingMs);
      }
    }
  }
  // Backward: just rewind, no buffer change

  state.current = targetIndex;
  state.elapsedMs = 0;
  state.bufferActive = false;
  if (!state.running) {
    state.running = true;
    lastTick = null;
    rafId = requestAnimationFrame(runLoop);
  } else {
    lastTick = null;
  }
  render();
  void saveTimerState();
}

async function deleteTimer(id) {
  if (!(await ensureAuthenticated('delete this timer'))) return;
  const idx = state.timers.findIndex(timer => timer.id === id);
  if (idx === -1) return;

  const client = initSupabase();
  const { error } = await client
    .from(TIMER_TABLE)
    .delete()
    .eq('id', id)
    .eq('owner_id', cloudState.user.id);

  if (error) {
    alert(error.message);
    return;
  }

  if (idx < state.current) state.current = Math.max(0, state.current - 1);
  state.timers = state.timers.filter(timer => timer.id !== id);
  if (!state.timers.length) {
    state.current = 0;
    state.elapsedMs = 0;
    state.done = false;
    state.running = false;
  }
  syncCurrentBounds();
  render();

  if (!(await saveTimerPositions(true))) {
    await loadCloudState();
    return;
  }
  await saveTimerState(true);
}

async function addTimer(title, minutes, seconds) {
  const totalSeconds = (parseInt(minutes, 10) || 0) * 60 + (parseInt(seconds, 10) || 0);
  if (!title.trim() || totalSeconds <= 0) return;
  if (!(await ensureAuthenticated('add a new timer'))) return;

  const client = initSupabase();
  const { data, error } = await client
    .from(TIMER_TABLE)
    .insert({
      owner_id: cloudState.user.id,
      title: title.trim(),
      seconds: totalSeconds,
      position: state.timers.length
    })
    .select('id, title, seconds')
    .single();

  if (error) {
    alert(error.message);
    return;
  }

  state.timers.push({ id: data.id, title: data.title, seconds: data.seconds });
  if (state.done) {
    state.done = false;
    state.current = Math.max(0, state.timers.length - 1);
    state.elapsedMs = 0;
  }
  render();
  await saveTimerState(true);
}

async function startEdit(id) {
  if (!(await ensureAuthenticated('edit this timer'))) return;
  state.editingId = id;
  render();
}

async function startEditActive() {
  if (!(await ensureAuthenticated('edit the active timer'))) return;
  if (state.running) pauseTimer();
  state.editingActive = true;
  render();
}

async function saveEditActive() {
  if (!(await ensureAuthenticated('save changes to the active timer'))) return;
  const cur = state.timers[state.current];
  if (!cur) {
    state.editingActive = false;
    render();
    return;
  }

  const title = document.getElementById('ae-title')?.value || '';
  const mins = parseInt(document.getElementById('ae-min')?.value, 10) || 0;
  const secs = parseInt(document.getElementById('ae-sec')?.value, 10) || 0;
  const nextSeconds = mins * 60 + secs;
  const nextTitle = title.trim() || cur.title;
  const duration = nextSeconds > 0 ? nextSeconds : cur.seconds;

  const client = initSupabase();
  const { error } = await client
    .from(TIMER_TABLE)
    .update({ title: nextTitle, seconds: duration })
    .eq('id', cur.id)
    .eq('owner_id', cloudState.user.id);

  if (error) {
    alert(error.message);
    return;
  }

  cur.title = nextTitle;
  cur.seconds = duration;
  state.elapsedMs = Math.min(state.elapsedMs, Math.max(duration * 1000 - 1, 0));
  state.editingActive = false;
  render();
  await saveTimerState(true);
}

function cancelEditActive() {
  state.editingActive = false;
  render();
}

async function saveEdit(id) {
  if (!(await ensureAuthenticated('save changes to this timer'))) return;
  const title = document.getElementById(`et-${id}`)?.value || '';
  const mins = parseInt(document.getElementById(`em-${id}`)?.value, 10) || 0;
  const secs = parseInt(document.getElementById(`es-${id}`)?.value, 10) || 0;
  const timer = state.timers.find(item => item.id === id);
  if (!timer) return;

  const nextTitle = title.trim() || timer.title;
  const nextSeconds = mins * 60 + secs;
  const duration = nextSeconds > 0 ? nextSeconds : timer.seconds;

  const client = initSupabase();
  const { error } = await client
    .from(TIMER_TABLE)
    .update({ title: nextTitle, seconds: duration })
    .eq('id', id)
    .eq('owner_id', cloudState.user.id);

  if (error) {
    alert(error.message);
    return;
  }

  timer.title = nextTitle;
  timer.seconds = duration;
  state.editingId = null;
  syncCurrentBounds();
  render();
  await saveTimerState(true);
}

let dragSrcIndex = null;

function onDragStart(e) {
  dragSrcIndex = Number(e.currentTarget.dataset.index);
  e.currentTarget.classList.add('dragging');
  e.dataTransfer.effectAllowed = 'move';
}

function onDragOver(e) {
  e.preventDefault();
  e.dataTransfer.dropEffect = 'move';
  const row = e.currentTarget;
  document.querySelectorAll('.timer-row.drag-over').forEach(el => el.classList.remove('drag-over'));
  row.classList.add('drag-over');
}

function onDragLeave(e) {
  e.currentTarget.classList.remove('drag-over');
}

function onDrop(e) {
  e.preventDefault();
  e.currentTarget.classList.remove('drag-over');
  const toIndex = Number(e.currentTarget.dataset.index);
  if (dragSrcIndex === null || dragSrcIndex === toIndex) return;
  reorderTimer(dragSrcIndex, toIndex);
}

function onDragEnd(e) {
  e.currentTarget.classList.remove('dragging');
  document.querySelectorAll('.timer-row.drag-over').forEach(el => el.classList.remove('drag-over'));
  dragSrcIndex = null;
}

function reorderTimer(from, to) {
  const activeId = state.timers[state.current]?.id;
  const [moved] = state.timers.splice(from, 1);
  state.timers.splice(to, 0, moved);
  if (activeId) {
    state.current = state.timers.findIndex(t => t.id === activeId);
  }
  syncCurrentBounds();
  render();
  void saveTimerPositions(true).then(() => saveTimerState(true));
}

function toggleSound() {
  state.sound = !state.sound;
  render();
  void saveTimerState();
}

    <path d="M6.2 13.1c.33.63.99 1.05 1.8 1.05.81 0 1.47-.42 1.8-1.05" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>

function signedOutMarkup() {

}

  const totalSec = state.timers.reduce((sum, timer) => sum + timer.seconds, 0);

  badge.textContent = cloudState.user && state.timers.length
    ? `${state.timers.length} slide${state.timers.length !== 1 ? 's' : ''} · ${fmtShort(totalSec)} total`

  } else if (state.editingActive && cur) {

      <div id="progress-stripe" style="position:absolute;top:0;left:0;height:2px;background:var(--active-light);width:${pct}%"></div>

      html += `<div class="buffer-section">

        <input class="add-input" id="buf-sec" type="number" min="0" max="59" value="${bufSecs}" style="width:52px;text-align:center;font-family:var(--mono);font-size:16px;padding:4px 6px;" />
        <div class="buffer-actions">
          <button class="btn" onclick="saveEditBuffer()" style="font-size:12px;padding:5px 10px;">Apply</button>
          <button class="btn btn-ghost" onclick="cancelEditBuffer()" style="font-size:12px;">Cancel</button>
        </div>
      </div>`;
    } else {
      html += `<div class="buffer-section${state.bufferActive ? ' active' : ''}">
        <span class="buffer-label">${state.bufferActive ? '⏳ buffer' : 'buffer'}</span>
        <span class="buffer-time" id="buffer-display">${fmtMs(state.bufferRemainingMs)}</span>
        <div class="buffer-actions">
          <button class="btn${state.bufferActive ? ' btn-primary' : ''}" onclick="toggleBuffer()" style="font-size:12px;padding:5px 12px;">${state.bufferActive ? '■ Stop' : '▶ Use'}</button>
          <button class="btn" onclick="skipAddToBuffer()" title="Skip to next timer and add remaining time to buffer" style="font-size:12px;padding:5px 12px;">⏭ Bank</button>
          <button class="row-btn" onclick="startEditBuffer()" title="Edit buffer time" style="font-size:12px;">✎</button>
        </div>
      </div>`;
    }
  }

  // Slide sync section
  if (!state.done && state.timers.length && !state.editingActive) {
    const dotClass = state.slideSyncConnected ? 'connected' : (state.slideSyncEnabled ? 'waiting' : '');
    const sectionClass = state.slideSyncConnected ? ' connected' : '';
    const statusText = state.slideSyncConnected ? 'Connected to Google Slides' : (state.slideSyncEnabled ? 'Waiting for Slides…' : 'Off — paste snippet in Speaker Notes console');
    html += `<div class="sync-section${sectionClass}">
      <span class="sync-dot ${dotClass}"></span>
      <span class="sync-label">slides sync</span>
      <span style="font-size:12px;color:var(--text3);">${statusText}</span>
      <div class="sync-actions">
        ${state.slideSyncEnabled ? '<button class="btn" id="copy-snippet-btn" onclick="copySyncSnippet()" style="font-size:11px;padding:4px 10px;" title="Paste in Speaker Notes window DevTools console (Presenter view)">📋 Copy snippet</button>' : ''}
        <button class="btn${state.slideSyncEnabled ? ' btn-primary' : ''}" onclick="toggleSlideSync()" style="font-size:12px;padding:5px 12px;">${state.slideSyncEnabled ? '■ Stop' : '▶ Sync'}</button>
      </div>
    </div>`;
  }

  const afterRemaining = state.timers.slice(state.current + 1).reduce((sum, timer) => sum + timer.seconds, 0);

  html += `<div class="queue-header">
    <span class="queue-label">Queue</span>
    <span class="badge">${!state.done && afterRemaining > 0 ? `${fmtShort(afterRemaining)} remaining after this` : ''}</span>
  </div><div class="queue-scroll">`;

  state.timers.forEach((timer, index) => {
    const isDone = !state.done && index < state.current;
    const isActive = index === state.current && !state.done;
    if (isActive) return;

    if (state.editingId === timer.id) {
      const minutes = Math.floor(timer.seconds / 60);
      const seconds = timer.seconds % 60;
      html += `<div class="timer-row" style="grid-template-columns:32px 1fr 62px 52px 60px;gap:8px;">
        <span class="row-index">${index + 1}</span>
        <input class="edit-input" id="et-${timer.id}" value="${esc(timer.title)}" />
        <input class="add-input" id="em-${timer.id}" type="number" min="0" max="999" value="${minutes}" style="width:54px;padding:4px 8px;font-size:12px;text-align:center;" />
        <input class="add-input" id="es-${timer.id}" type="number" min="0" max="59" value="${seconds}" style="width:44px;padding:4px 6px;font-size:12px;text-align:center;" />
        <button class="add-btn" onclick="saveEdit('${timer.id}')" style="font-size:12px;padding:4px 8px;">Save</button>
      </div>`;
      return;
    }

    html += `<div class="timer-row${isDone ? ' done' : ''}" draggable="true" data-index="${index}" ondragstart="onDragStart(event)" ondragover="onDragOver(event)" ondragleave="onDragLeave(event)" ondrop="onDrop(event)" ondragend="onDragEnd(event)">
      <span class="row-index">${isDone ? '✓' : index + 1}</span>
      <span class="row-title">${esc(timer.title)}</span>
      <span class="row-time">${fmt(timer.seconds)}</span>
      <div class="row-actions">
        <button class="row-btn" onclick="startEdit('${timer.id}')">✎</button>
        <button class="row-btn del" onclick="deleteTimer('${timer.id}')">✕</button>
      </div>
    </div>`;
  });

  html += `</div><div class="add-area"><div class="add-form">
    <input class="add-input" id="new-title" placeholder="Timer title…" onkeydown="if(event.key==='Enter')addFromForm()" />
    <input class="add-input" id="new-min" type="number" min="0" max="999" placeholder="min" style="text-align:center;" onkeydown="if(event.key==='Enter')addFromForm()" />
    <input class="add-input" id="new-sec" type="number" min="0" max="59" placeholder="sec" style="text-align:center;" onkeydown="if(event.key==='Enter')addFromForm()" />
    <button class="add-btn" onclick="addFromForm()">+ Add</button>
  </div></div>`;

  app.innerHTML = html;

  const queue = document.querySelector('.queue-scroll');
  if (queue) {
    const first = queue.querySelector('.timer-row:not(.done)');
    if (first) setTimeout(() => first.scrollIntoView({ block: 'nearest', behavior: 'smooth' }), 50);
  }
}

async function addFromForm() {
  const title = document.getElementById('new-title')?.value || '';
  const mins = document.getElementById('new-min')?.value || '0';
  const secs = document.getElementById('new-sec')?.value || '0';
  await addTimer(title, mins, secs);
  setTimeout(() => document.getElementById('new-title')?.focus(), 0);
}

document.getElementById('authBtn').addEventListener('click', function() {
  void handleAuthButton();
});

document.addEventListener('visibilitychange', function() {
  if (document.visibilityState === 'hidden' && cloudState.user) void saveTimerState();
});

window.addEventListener('beforeunload', function() {
  if (cloudState.user) void saveTimerState();
});

setInterval(function() {
  if (state.running && cloudState.user) void saveTimerState();
}, 10000);

updateAuthButton();
bindAuthListener();
render();
void refreshSession().then(loadCloudState);
</script>
</body>
</html>
