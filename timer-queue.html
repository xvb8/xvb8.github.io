<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Timer Queue</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0e0e0e;
    --surface: #161616;
    --surface2: #1e1e1e;
    --surface3: #262626;
    --border: rgba(255,255,255,0.08);
    --border2: rgba(255,255,255,0.14);
    --text: #f0ece4;
    --text2: #a09890;
    --text3: #5a5450;
    --accent2: #c4a96b;
    --active: #3a8c6e;
    --active-light: #4fbf94;
    --danger: #c45a4a;
    --done-bg: #1a241a;
    --done-text: #6a9a6a;
    --mono: 'DM Mono', monospace;
    --sans: 'DM Sans', sans-serif;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 2rem 1rem 4rem;
  }

  header {
    width: 100%;
    max-width: 700px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 2.5rem;
    padding-bottom: 1rem;
    border-bottom: 1px solid var(--border);
  }

  h1 {
    font-family: var(--mono);
    font-size: 13px;
    font-weight: 400;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--text2);
  }

  .header-meta {
    display: flex;
    align-items: center;
    gap: 10px;
    flex-wrap: wrap;
    justify-content: flex-end;
  }

  .badge { font-family: var(--mono); font-size: 11px; color: var(--text3); letter-spacing: 0.08em; }

  .main { width: 100%; max-width: 700px; display: flex; flex-direction: column; gap: 10px; }

  .active-card {
    background: var(--surface);
    border: 1px solid var(--border2);
    border-radius: 12px;
    padding: 2rem 2rem 1.5rem;
    position: relative;
    overflow: hidden;
    margin-bottom: 4px;
  }

  #progress-stripe {
    position: absolute;
    top: 0; left: 0;
    height: 2px;
    background: var(--active-light);
    width: 0%;
  }

  .active-label {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--active-light);
    margin-bottom: 0.5rem;
  }

  .active-title { font-size: 22px; font-weight: 400; color: var(--text); margin-bottom: 1.25rem; letter-spacing: -0.01em; }

  #timer-display {
    font-family: var(--mono);
    font-size: 56px;
    font-weight: 300;
    letter-spacing: -0.03em;
    color: var(--text);
    line-height: 1;
    margin-bottom: 1.5rem;
    font-variant-numeric: tabular-nums;
  }

  .progress-bar { width: 100%; height: 3px; background: var(--surface3); border-radius: 2px; overflow: hidden; margin-bottom: 1.5rem; }
  #progress-fill { height: 100%; background: var(--active-light); border-radius: 2px; }

  .controls { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }

  .btn {
    background: var(--surface2);
    border: 1px solid var(--border2);
    border-radius: 8px;
    color: var(--text2);
    font-family: var(--sans);
    font-size: 13px;
    cursor: pointer;
    padding: 8px 16px;
    transition: background 0.15s, color 0.15s;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .btn:hover { background: var(--surface3); color: var(--text); }
  .btn:active { opacity: 0.8; }

  .btn-primary { background: var(--active); border-color: transparent; color: #d4efe6; font-weight: 500; padding: 8px 20px; }
  .btn-primary:hover { background: #449e7e; color: #fff; border-color: transparent; }

  .btn-ghost { background: transparent; border-color: transparent; color: var(--text3); font-size: 12px; }
  .btn-ghost:hover { background: var(--surface2); color: var(--text2); border-color: transparent; }

  .queue-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0 2px;
    margin-bottom: 2px;
    margin-top: 6px;
  }

  .queue-label { font-family: var(--mono); font-size: 10px; letter-spacing: 0.15em; text-transform: uppercase; color: var(--text3); }

  .queue-scroll {
    display: flex;
    flex-direction: column;
    gap: 5px;
    max-height: 360px;
    overflow-y: auto;
    padding-right: 3px;
  }

  .queue-scroll::-webkit-scrollbar { width: 4px; }
  .queue-scroll::-webkit-scrollbar-track { background: transparent; }
  .queue-scroll::-webkit-scrollbar-thumb { background: var(--surface3); border-radius: 2px; }

  .timer-row {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 14px;
    display: grid;
    grid-template-columns: 32px 1fr auto auto;
    gap: 10px;
    align-items: center;
  }

  .timer-row:hover { border-color: var(--border2); }

  .timer-row.done {
    background: var(--done-bg);
    border-color: transparent;
    opacity: 0.45;
  }

  .row-index { font-family: var(--mono); font-size: 11px; color: var(--text3); text-align: center; }
  .timer-row.done .row-index { color: var(--done-text); }

  .row-title { font-size: 13px; color: var(--text); }
  .timer-row.done .row-title { text-decoration: line-through; color: var(--text3); }

  .row-time { font-family: var(--mono); font-size: 12px; color: var(--text2); }
  .timer-row.done .row-time { color: var(--done-text); }

  .row-actions { display: flex; gap: 3px; opacity: 0; transition: opacity 0.12s; }
  .timer-row:hover .row-actions { opacity: 1; }

  .row-btn {
    background: none; border: none; color: var(--text3);
    cursor: pointer; padding: 3px 5px; border-radius: 4px;
    font-size: 12px; transition: all 0.1s;
  }
  .row-btn:hover { color: var(--text); background: var(--surface3); }
  .row-btn.del:hover { color: var(--danger); }

  .add-area {
    background: var(--surface);
    border: 1px dashed var(--border2);
    border-radius: 10px;
    padding: 12px 14px;
    margin-top: 4px;
  }

  .add-form { display: grid; grid-template-columns: 1fr 70px 58px 62px; gap: 8px; align-items: center; }

  .add-input {
    background: var(--surface3);
    border: 1px solid var(--border2);
    border-radius: 6px;
    color: var(--text);
    font-family: var(--sans);
    font-size: 13px;
    padding: 7px 10px;
    outline: none;
    width: 100%;
  }

  .add-input:focus { border-color: var(--active-light); }
  .add-input::placeholder { color: var(--text3); }

  .add-btn {
    background: var(--surface2); border: 1px solid var(--border2); border-radius: 6px;
    color: var(--text2); font-size: 13px; padding: 7px 10px; cursor: pointer;
    font-family: var(--sans); width: 100%; transition: all 0.15s;
  }
  .add-btn:hover { background: var(--active); color: #d4efe6; border-color: transparent; }

  .complete-banner {
    background: var(--done-bg); border: 1px solid #3a5a3a; border-radius: 10px;
    padding: 2rem; text-align: center;
  }
  .complete-banner h2 { font-size: 18px; font-weight: 400; color: var(--done-text); margin-bottom: 6px; }
  .complete-banner p { font-size: 13px; color: var(--text3); margin-bottom: 1.25rem; }

  .edit-input {
    background: var(--surface3); border: 1px solid var(--active-light); border-radius: 4px;
    color: var(--text); font-family: inherit; font-size: 13px; padding: 3px 6px; outline: none; width: 100%;
  }

  @keyframes urgentBlink { 0%,100% { opacity: 1; } 50% { opacity: 0.25; } }
  .urgent-anim { animation: urgentBlink 1s ease-in-out infinite; color: var(--danger) !important; }
</style>
</head>
<body>
<header>
  <h1>Timer Queue</h1>
  <div class="header-meta">
    <button class="btn btn-ghost" id="protectionBtn">Set Edit Lock</button>
    <span class="badge" id="total-badge"></span>
  </div>
</header>

<div class="main" id="app"></div>

<script>
const PASSWORD_HASH_COOKIE = 'xvb8_edit_lock_hash';
const PASSWORD_AUTH_COOKIE = 'xvb8_edit_lock_auth';
const PASSWORD_COOKIE_DAYS = 365;
const AUTH_COOKIE_DAYS = 7;

const state = {
  timers: Array.from({length: 34}, (_, i) => ({ id: i+1, title: `Slide ${i+1}`, seconds: 2*60 })),
  current: 0,
  elapsed: 0,
  running: false,
  done: false,
  editingId: null,
  editingActive: false,
  sound: true,
  nextId: 35
};

let rafId = null;
let lastTick = null;

function getCookie(name) {
  const prefix = `${name}=`;
  const match = document.cookie
    .split(';')
    .map(part => part.trim())
    .find(part => part.startsWith(prefix));
  return match ? decodeURIComponent(match.slice(prefix.length)) : '';
}

function setCookie(name, value, days) {
  const expires = new Date(Date.now() + days * 864e5).toUTCString();
  document.cookie = `${name}=${encodeURIComponent(value)}; expires=${expires}; path=/; SameSite=Lax`;
}

function clearCookie(name) {
  document.cookie = `${name}=; expires=Thu, 01 Jan 1970 00:00:00 GMT; path=/; SameSite=Lax`;
}

function fallbackHash(value) {
  let hash = 2166136261;
  for (let index = 0; index < value.length; index++) {
    hash ^= value.charCodeAt(index);
    hash = Math.imul(hash, 16777619);
  }
  return `fallback-${(hash >>> 0).toString(16).padStart(8, '0')}`;
}

async function hashPassword(value) {
  if (!window.crypto || !window.crypto.subtle || typeof TextEncoder === 'undefined') {
    return fallbackHash(value);
  }
  const bytes = new TextEncoder().encode(value);
  const digest = await crypto.subtle.digest('SHA-256', bytes);
  return Array.from(new Uint8Array(digest), byte => byte.toString(16).padStart(2, '0')).join('');
}

function hasProtectionEnabled() {
  return Boolean(getCookie(PASSWORD_HASH_COOKIE));
}

function isProtectionAuthorized() {
  const expectedHash = getCookie(PASSWORD_HASH_COOKIE);
  return Boolean(expectedHash) && getCookie(PASSWORD_AUTH_COOKIE) === expectedHash;
}

function updateProtectionButton() {
  const button = document.getElementById('protectionBtn');
  if (!button) return;
  if (!hasProtectionEnabled()) {
    button.textContent = 'Set Edit Lock';
    return;
  }
  button.textContent = isProtectionAuthorized() ? 'Edit Lock: On' : 'Edit Lock: Locked';
}

async function authorizeProtection(actionLabel) {
  const expectedHash = getCookie(PASSWORD_HASH_COOKIE);
  if (!expectedHash) return false;
  if (isProtectionAuthorized()) return true;

  const entered = window.prompt(`Enter the edit password to ${actionLabel}.`);
  if (entered === null) return false;

  const enteredHash = await hashPassword(entered);
  if (enteredHash !== expectedHash) {
    alert('Incorrect password.');
    return false;
  }

  setCookie(PASSWORD_AUTH_COOKIE, expectedHash, AUTH_COOKIE_DAYS);
  updateProtectionButton();
  return true;
}

async function configureProtection() {
  const hasExistingPassword = hasProtectionEnabled();
  if (hasExistingPassword) {
    const choice = window.prompt('Password options: type "change" to update it, "clear" to remove it, or leave blank to cancel.');
    if (!choice) return;

    if (choice.toLowerCase() === 'clear') {
      if (!(await authorizeProtection('clear the edit password'))) return;
      if (!window.confirm('Remove edit/delete password protection from this browser?')) return;
      clearCookie(PASSWORD_HASH_COOKIE);
      clearCookie(PASSWORD_AUTH_COOKIE);
      updateProtectionButton();
      alert('Edit password removed.');
      return;
    }

    if (choice.toLowerCase() !== 'change') return;
    if (!(await authorizeProtection('change the edit password'))) return;
  }

  const first = window.prompt(hasExistingPassword ? 'Enter the new edit password.' : 'Create an edit password for edit/delete actions.');
  if (first === null) return;
  if (!first.trim()) {
    alert('Password cannot be empty.');
    return;
  }

  const second = window.prompt('Re-enter the password to confirm.');
  if (second === null) return;
  if (first !== second) {
    alert('Passwords did not match.');
    return;
  }

  const hashed = await hashPassword(first);
  setCookie(PASSWORD_HASH_COOKIE, hashed, PASSWORD_COOKIE_DAYS);
  setCookie(PASSWORD_AUTH_COOKIE, hashed, AUTH_COOKIE_DAYS);
  if (getCookie(PASSWORD_HASH_COOKIE) !== hashed) {
    alert('Could not save the password cookie in this browser. Check your cookie settings and try again.');
    return;
  }
  updateProtectionButton();
  alert(hasExistingPassword ? 'Edit password updated.' : 'Edit password saved.');
}

async function ensureProtectedAccess(actionLabel) {
  if (!hasProtectionEnabled()) {
    const shouldCreate = window.confirm('Editing and deleting are unlocked. Set an edit password now?');
    if (!shouldCreate) return false;
    await configureProtection();
    if (!hasProtectionEnabled()) return false;
  }
  return authorizeProtection(actionLabel);
}

function pad(n) { return String(n).padStart(2,'0'); }

function fmt(s) {
  s = Math.max(0, s);
  const h = Math.floor(s/3600), m = Math.floor((s%3600)/60), sec = s%60;
  return h > 0 ? `${pad(h)}:${pad(m)}:${pad(sec)}` : `${pad(m)}:${pad(sec)}`;
}

function fmtShort(s) {
  const h = Math.floor(s/3600), m = Math.floor((s%3600)/60), sec = s%60;
  if (h > 0) return `${h}h ${m}m`;
  if (m > 0) return `${m}m${sec > 0 ? ' '+sec+'s' : ''}`;
  return `${sec}s`;
}

function beep() {
  if (!state.sound) return;
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const osc = ctx.createOscillator(), gain = ctx.createGain();
    osc.connect(gain); gain.connect(ctx.destination);
    osc.frequency.value = 880;
    gain.gain.setValueAtTime(0.3, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.4);
    osc.start(); osc.stop(ctx.currentTime + 0.4);
  } catch(e) {}
}

function runLoop(ts) {
  if (!state.running) return;
  if (lastTick === null) lastTick = ts;
  const delta = ts - lastTick;
  if (delta >= 1000) {
    lastTick = ts - (delta % 1000);
    const cur = state.timers[state.current];
    state.elapsed++;
    if (state.elapsed >= cur.seconds) {
      beep();
      state.current++;
      state.elapsed = 0;
      if (state.current >= state.timers.length) {
        state.running = false;
        state.done = true;
        render();
        return;
      }
      render();
      lastTick = null;
      rafId = requestAnimationFrame(runLoop);
      return;
    }
  }
  updateActiveDisplay();
  rafId = requestAnimationFrame(runLoop);
}

function updateActiveDisplay() {
  const cur = state.timers[state.current];
  if (!cur) return;
  const remaining = cur.seconds - state.elapsed;
  const pct = (state.elapsed / cur.seconds) * 100;

  const disp = document.getElementById('timer-display');
  if (disp) {
    disp.textContent = fmt(remaining);
    if (remaining <= 10) disp.classList.add('urgent-anim');
    else disp.classList.remove('urgent-anim');
  }

  const fill = document.getElementById('progress-fill');
  if (fill) fill.style.width = pct + '%';

  const stripe = document.getElementById('progress-stripe');
  if (stripe) stripe.style.width = pct + '%';

  updateBadge();
}

function updateBadge() {
  const badge = document.getElementById('total-badge');
  if (!badge) return;
  if (!state.timers.length) { badge.textContent = ''; return; }
  const rem = state.timers.slice(state.current).reduce((s,t,i) =>
    s + (i===0 ? t.seconds - state.elapsed : t.seconds), 0);
  badge.textContent = `${state.timers.length} slides · ${fmtShort(rem)} left`;
}

function startTimer() {
  if (state.done || !state.timers.length) return;
  state.running = true;
  lastTick = null;

  const card = document.querySelector('.active-card');
  if (card) {
    const lbl = card.querySelector('.active-label');
    if (lbl) lbl.textContent = 'now running';
    card.style.setProperty('--stripe-color', 'var(--active-light)');
  }

  const pb = document.getElementById('play-btn');
  if (pb) pb.outerHTML = `<button class="btn btn-primary" id="play-btn" onclick="pauseTimer()">⏸ Pause</button>`;

  const stripe = document.getElementById('progress-stripe');
  if (stripe) stripe.style.background = 'var(--active-light)';
  const fill = document.getElementById('progress-fill');
  if (fill) fill.style.background = 'var(--active-light)';

  rafId = requestAnimationFrame(runLoop);
}

function pauseTimer() {
  state.running = false;
  cancelAnimationFrame(rafId);

  const card = document.querySelector('.active-card');
  const lbl = card?.querySelector('.active-label');
  if (lbl) lbl.textContent = 'paused';

  const stripe = document.getElementById('progress-stripe');
  if (stripe) stripe.style.background = 'var(--accent2)';
  const fill = document.getElementById('progress-fill');
  if (fill) fill.style.background = 'var(--accent2)';

  const pb = document.getElementById('play-btn');
  if (pb) pb.outerHTML = `<button class="btn btn-primary" id="play-btn" onclick="startTimer()">▶ Resume</button>`;
}

function skipTimer() {
  beep();
  state.current++;
  state.elapsed = 0;
  if (state.current >= state.timers.length) {
    cancelAnimationFrame(rafId);
    state.running = false;
    state.done = true;
  }
  lastTick = null;
  render();
  if (state.running) rafId = requestAnimationFrame(runLoop);
}

function resetAll() {
  cancelAnimationFrame(rafId);
  state.current = 0;
  state.elapsed = 0;
  state.running = false;
  state.done = false;
  state.editingActive = false;
  lastTick = null;
  render();
}

async function deleteTimer(id) {
  if (!(await ensureProtectedAccess('delete this timer'))) return;
  const idx = state.timers.findIndex(t => t.id === id);
  if (idx < state.current) state.current = Math.max(0, state.current - 1);
  state.timers = state.timers.filter(t => t.id !== id);
  if (!state.timers.length) { state.current = 0; state.done = false; }
  render();
}

function addTimer(title, minutes, seconds) {
  const s = (parseInt(minutes)||0)*60 + (parseInt(seconds)||0);
  if (!title.trim() || s <= 0) return;
  state.timers.push({ id: state.nextId++, title: title.trim(), seconds: s });
  if (state.done) state.done = false;
  render();
}

async function startEdit(id) {
  if (!(await ensureProtectedAccess('edit this timer'))) return;
  state.editingId = id;
  render();
}

async function startEditActive() {
  if (!(await ensureProtectedAccess('edit the active timer'))) return;
  if (state.running) pauseTimer();
  state.editingActive = true;
  render();
}

async function saveEditActive() {
  if (!(await ensureProtectedAccess('save changes to the active timer'))) return;
  const cur = state.timers[state.current];
  if (!cur) { state.editingActive = false; render(); return; }
  const title = document.getElementById('ae-title')?.value || '';
  const mins  = parseInt(document.getElementById('ae-min')?.value)  || 0;
  const secs  = parseInt(document.getElementById('ae-sec')?.value)  || 0;
  const ns = mins * 60 + secs;
  if (title.trim()) cur.title = title.trim();
  if (ns > 0) {
    cur.seconds = ns;
    state.elapsed = Math.min(state.elapsed, ns - 1);
  }
  state.editingActive = false;
  render();
}

function cancelEditActive() { state.editingActive = false; render(); }

async function saveEdit(id) {
  if (!(await ensureProtectedAccess('save changes to this timer'))) return;
  const title = document.getElementById(`et-${id}`)?.value || '';
  const mins = parseInt(document.getElementById(`em-${id}`)?.value) || 0;
  const secs = parseInt(document.getElementById(`es-${id}`)?.value) || 0;
  const t = state.timers.find(t => t.id === id);
  if (t) {
    if (title.trim()) t.title = title.trim();
    const ns = mins*60+secs;
    if (ns > 0) t.seconds = ns;
  }
  state.editingId = null;
  render();
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function toggleSound() { state.sound = !state.sound; render(); }

function render() {
  const app = document.getElementById('app');
  const cur = state.timers[state.current];
  const remaining = cur ? cur.seconds - state.elapsed : 0;
  const pct = cur ? (state.elapsed / cur.seconds) * 100 : 0;
  const totalSec = state.timers.reduce((s,t)=>s+t.seconds,0);

  document.getElementById('total-badge').textContent = state.timers.length
    ? `${state.timers.length} slide${state.timers.length!==1?'s':''} · ${fmtShort(totalSec)} total`
    : '';

  let html = '';

  if (!state.timers.length) {
    html = `<div style="text-align:center;padding:3rem 2rem;background:var(--surface);border:1px dashed var(--border2);border-radius:12px;font-size:13px;color:var(--text3);">Add timers below to get started</div>`;
  } else if (state.done) {
    html = `<div class="complete-banner">
      <h2>All slides complete</h2>
      <p>Total time · ${fmtShort(totalSec)}</p>
      <button class="btn btn-primary" onclick="resetAll()" style="margin:0 auto;">↺ Reset &amp; Start Over</button>
    </div>`;
  } else if (state.editingActive) {
    const m = Math.floor(cur.seconds/60), s = cur.seconds%60;
    html = `<div class="active-card" style="border-color:var(--active-light);">
      <div id="progress-stripe" style="position:absolute;top:0;left:0;height:2px;background:var(--active-light);width:${pct}%"></div>
      <div class="active-label" style="color:var(--accent2);">editing</div>
      <div style="display:grid;grid-template-columns:1fr auto;gap:10px;align-items:center;margin-bottom:1.25rem;">
        <input class="edit-input" id="ae-title" value="${esc(cur.title)}" style="font-size:18px;padding:6px 10px;" />
      </div>
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:1.5rem;">
        <span style="font-family:var(--mono);font-size:13px;color:var(--text3);">Duration</span>
        <input class="add-input" id="ae-min" type="number" min="0" max="999" value="${m}" placeholder="min"
          style="width:70px;text-align:center;font-family:var(--mono);font-size:22px;padding:6px 8px;" />
        <span style="font-family:var(--mono);font-size:20px;color:var(--text3);">:</span>
        <input class="add-input" id="ae-sec" type="number" min="0" max="59" value="${s}" placeholder="sec"
          style="width:70px;text-align:center;font-family:var(--mono);font-size:22px;padding:6px 8px;" />
        <span style="font-size:12px;color:var(--text3);margin-left:2px;">min / sec</span>
      </div>
      <div class="controls">
        <button class="btn btn-primary" onclick="saveEditActive()">✓ Apply</button>
        <button class="btn btn-ghost" onclick="cancelEditActive()">Cancel</button>
      </div>
    </div>`;
  } else {
    const paused = !state.running;
    const fillColor = paused ? 'var(--accent2)' : 'var(--active-light)';
    html = `<div class="active-card">
      <div id="progress-stripe" style="position:absolute;top:0;left:0;height:2px;background:${fillColor};width:${pct}%"></div>
      <div class="active-label">${state.running ? 'now running' : 'paused'}</div>
      <div style="display:flex;align-items:baseline;justify-content:space-between;margin-bottom:1.25rem;">
        <div class="active-title" style="margin-bottom:0;">${esc(cur.title)}</div>
        <button class="row-btn" onclick="startEditActive()" title="Edit this timer" style="opacity:0.5;font-size:13px;padding:4px 8px;flex-shrink:0;">✎ edit</button>
      </div>
      <div id="timer-display"${remaining<=10&&remaining>0&&state.running?' class="urgent-anim"':''}>${fmt(remaining)}</div>
      <div class="progress-bar"><div id="progress-fill" style="width:${pct}%;background:${fillColor}"></div></div>
      <div class="controls">
        ${state.running
          ? `<button class="btn btn-primary" id="play-btn" onclick="pauseTimer()">⏸ Pause</button>`
          : `<button class="btn btn-primary" id="play-btn" onclick="startTimer()">▶ ${state.elapsed>0||state.current>0?'Resume':'Start'}</button>`}
        <button class="btn" onclick="skipTimer()">Skip →</button>
        <button class="btn btn-ghost" onclick="resetAll()">↺ Reset all</button>
        <button class="btn btn-ghost" style="margin-left:auto;" onclick="toggleSound()">${state.sound?'🔔':'🔕'}</button>
      </div>
    </div>`;
  }

  const afterRemaining = state.timers.slice(state.current+1).reduce((s,t)=>s+t.seconds,0);

  html += `<div class="queue-header">
    <span class="queue-label">Queue</span>
    <span class="badge">${!state.done&&afterRemaining>0?fmtShort(afterRemaining)+' remaining after this':''}</span>
  </div><div class="queue-scroll">`;

  state.timers.forEach((t, i) => {
    const isDone = i < state.current;
    const isActive = i === state.current && !state.done;
    if (isActive) return;

    if (state.editingId === t.id) {
      const m = Math.floor(t.seconds/60), s = t.seconds%60;
      html += `<div class="timer-row" style="grid-template-columns:32px 1fr 62px 52px 60px;gap:8px;">
        <span class="row-index">${i+1}</span>
        <input class="edit-input" id="et-${t.id}" value="${esc(t.title)}" />
        <input class="add-input" id="em-${t.id}" type="number" min="0" max="999" value="${m}" style="width:54px;padding:4px 8px;font-size:12px;text-align:center;" />
        <input class="add-input" id="es-${t.id}" type="number" min="0" max="59" value="${s}" style="width:44px;padding:4px 6px;font-size:12px;text-align:center;" />
        <button class="add-btn" onclick="saveEdit(${t.id})" style="font-size:12px;padding:4px 8px;">Save</button>
      </div>`;
    } else {
      html += `<div class="timer-row${isDone?' done':''}">
        <span class="row-index">${isDone?'✓':i+1}</span>
        <span class="row-title">${esc(t.title)}</span>
        <span class="row-time">${fmt(t.seconds)}</span>
        <div class="row-actions">
          <button class="row-btn" onclick="startEdit(${t.id})">✎</button>
          <button class="row-btn del" onclick="deleteTimer(${t.id})">✕</button>
        </div>
      </div>`;
    }
  });

  html += `</div><div class="add-area"><div class="add-form">
    <input class="add-input" id="new-title" placeholder="Timer title…" onkeydown="if(event.key==='Enter')addFromForm()" />
    <input class="add-input" id="new-min" type="number" min="0" max="999" placeholder="min" style="text-align:center;" onkeydown="if(event.key==='Enter')addFromForm()" />
    <input class="add-input" id="new-sec" type="number" min="0" max="59" placeholder="sec" style="text-align:center;" onkeydown="if(event.key==='Enter')addFromForm()" />
    <button class="add-btn" onclick="addFromForm()">+ Add</button>
  </div></div>`;

  app.innerHTML = html;

  const qs = document.querySelector('.queue-scroll');
  if (qs) {
    const first = qs.querySelector('.timer-row:not(.done)');
    if (first) setTimeout(() => first.scrollIntoView({ block: 'nearest', behavior: 'smooth' }), 50);
  }
}

function addFromForm() {
  const title = document.getElementById('new-title')?.value || '';
  const mins  = document.getElementById('new-min')?.value  || '0';
  const secs  = document.getElementById('new-sec')?.value  || '0';
  addTimer(title, mins, secs);
  setTimeout(() => document.getElementById('new-title')?.focus(), 0);
}

document.getElementById('protectionBtn').addEventListener('click', function() {
  configureProtection();
});

updateProtectionButton();
render();
</script>
</body>
</html>
